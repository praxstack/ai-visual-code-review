version: '3.8'

services:
  ai-code-review:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-visual-code-review
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
    volumes:
      # Mount current directory for reviewing code
      - .:/workspace:ro
    working_dir: /workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Development mode with hot reload
  ai-code-review-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: ai-visual-code-review-dev
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - PORT=3002
    volumes:
      - .:/app
      - /app/node_modules
    working_dir: /app
    command: npm run dev
    profiles:
      - dev
